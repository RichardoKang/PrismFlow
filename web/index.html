<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismFlow RAG Gateway - 对话测试</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #38bdf8;
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --user-msg-bg: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            --assistant-msg-bg: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
            border: 1px solid var(--border);
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .header h1::before {
            content: "";
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            background: var(--surface-hover);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            background: var(--bg-start);
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: var(--user-msg-bg);
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--assistant-msg-bg);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.assistant .message-content.streaming {
            position: relative;
        }

        .message.assistant .message-content.streaming::after {
            content: "▋";
            animation: blink 1s infinite;
            color: var(--primary);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .message.error .message-content {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Markdown Styles */
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: 600;
            color: var(--text);
        }

        .message-content h1 { font-size: 1.4em; }
        .message-content h2 { font-size: 1.2em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content p {
            margin-bottom: 0.8em;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin: 0.8em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin-bottom: 0.3em;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.8em 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 0.8em 0;
            color: var(--text-secondary);
        }

        .message-content a {
            color: var(--primary-light);
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content table {
            border-collapse: collapse;
            margin: 0.8em 0;
            width: 100%;
        }

        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .message-content th {
            background: rgba(0, 0, 0, 0.2);
        }

        .message-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1em 0;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 8px;
        }

        .input-container {
            padding: 20px 30px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 52px;
            max-height: 150px;
            background: var(--surface-hover);
            color: var(--text);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        textarea:disabled {
            background: var(--surface-hover);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 16px;
            background: var(--user-msg-bg);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 24px;
            height: 24px;
        }

        .metrics {
            padding: 10px 30px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metric-label {
            color: var(--text-muted);
        }

        .metric-value {
            font-weight: 600;
            color: var(--text);
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .welcome h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        .welcome p {
            margin-bottom: 20px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .suggestion {
            padding: 10px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text);
        }

        .suggestion:hover {
            border-color: var(--primary);
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        /* Scrollbar Styles */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-start);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--surface-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PrismFlow RAG Gateway</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="clear-btn" onclick="clearChat()">清空对话</button>
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">已连接</span>
                </div>
            </div>
        </div>

        <div class="metrics" id="metrics" style="display: none;">
            <div class="metric">
                <span class="metric-label">首字延迟:</span>
                <span class="metric-value" id="ttft">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">总耗时:</span>
                <span class="metric-value" id="totalTime">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Token数:</span>
                <span class="metric-value" id="tokenCount">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">速度:</span>
                <span class="metric-value" id="tokensPerSec">-</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome" id="welcome">
                <h2>👋 欢迎使用 PrismFlow</h2>
                <p>这是一个 RAG（检索增强生成）网关测试界面</p>
                <div class="suggestions">
                    <div class="suggestion" onclick="sendSuggestion('什么是 Go 语言？')">什么是 Go 语言？</div>
                    <div class="suggestion" onclick="sendSuggestion('RAG 架构是什么？')">RAG 架构是什么？</div>
                    <div class="suggestion" onclick="sendSuggestion('你好，请介绍一下自己')">你好，请介绍一下自己</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea
                        id="userInput"
                        placeholder="输入你的问题..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/v1/chat';
        let isStreaming = false;
        let startTime = null;
        let firstTokenTime = null;
        let tokenCount = 0;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendSuggestion(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function clearChat() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome" id="welcome">
                    <h2>👋 欢迎使用 PrismFlow</h2>
                    <p>这是一个 RAG（检索增强生成）网关测试界面</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="sendSuggestion('什么是 Go 语言？')">什么是 Go 语言？</div>
                        <div class="suggestion" onclick="sendSuggestion('RAG 架构是什么？')">RAG 架构是什么？</div>
                        <div class="suggestion" onclick="sendSuggestion('你好，请介绍一下自己')">你好，请介绍一下自己</div>
                    </div>
                </div>
            `;
            document.getElementById('metrics').style.display = 'none';
        }

        function addMessage(content, type, isStreaming = false) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = type === 'user' ? '👤' : '🤖';

            // Render markdown for assistant messages
            let renderedContent = content;
            if (type === 'assistant' && content) {
                renderedContent = marked.parse(content);
            }

            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="message-content ${isStreaming ? 'streaming' : ''}">${renderedContent}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv.querySelector('.message-content');
        }

        function updateMetrics() {
            const metricsDiv = document.getElementById('metrics');
            metricsDiv.style.display = 'flex';

            if (firstTokenTime && startTime) {
                const ttft = firstTokenTime - startTime;
                document.getElementById('ttft').textContent = `${ttft}ms`;
            }

            const totalTime = Date.now() - startTime;
            document.getElementById('totalTime').textContent = `${(totalTime / 1000).toFixed(2)}s`;
            document.getElementById('tokenCount').textContent = tokenCount;

            if (totalTime > 0) {
                const tokensPerSec = (tokenCount / (totalTime / 1000)).toFixed(1);
                document.getElementById('tokensPerSec').textContent = `${tokensPerSec} t/s`;
            }
        }

        async function sendMessage() {
            if (isStreaming) return;

            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const query = input.value.trim();

            if (!query) return;

            // 重置状态
            isStreaming = true;
            startTime = Date.now();
            firstTokenTime = null;
            tokenCount = 0;

            input.value = '';
            input.style.height = 'auto';
            input.disabled = true;
            sendBtn.disabled = true;

            // 添加用户消息
            addMessage(query, 'user');

            // 添加助手消息（流式）
            const assistantContent = addMessage('', 'assistant', true);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let lineBuffer = '';
                let contentBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    lineBuffer += decoder.decode(value, { stream: true });
                    const lines = lineBuffer.split('\n');
                    lineBuffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.done) {
                                    assistantContent.classList.remove('streaming');
                                    updateMetrics();
                                    continue;
                                }

                                if (data.content) {
                                    if (!firstTokenTime) {
                                        firstTokenTime = Date.now();
                                    }
                                    tokenCount++;
                                    contentBuffer += data.content;

                                    // Render markdown for assistant messages
                                    assistantContent.innerHTML = marked.parse(contentBuffer);

                                    // 实时更新指标
                                    if (tokenCount % 5 === 0) {
                                        updateMetrics();
                                    }
                                }

                                if (data.error) {
                                    throw new Error(data.error);
                                }
                            } catch (e) {
                                if (e.message !== 'Unexpected end of JSON input') {
                                    console.error('Parse error:', e);
                                }
                            }
                        }
                    }

                    // 滚动到底部
                    document.getElementById('chatContainer').scrollTop =
                        document.getElementById('chatContainer').scrollHeight;
                }

                assistantContent.classList.remove('streaming');
                updateMetrics();

            } catch (error) {
                console.error('Error:', error);
                assistantContent.classList.remove('streaming');
                assistantContent.parentElement.classList.add('error');
                assistantContent.textContent = `错误: ${error.message}`;

                // 更新状态指示器
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = '连接失败';
            } finally {
                isStreaming = false;
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // 检查服务状态
        async function checkStatus() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                // 发送一个简单的请求来检查服务
                await fetch(API_URL, {
                    method: 'OPTIONS',
                    signal: controller.signal
                }).catch(() => {});

                clearTimeout(timeoutId);
                document.getElementById('statusDot').classList.remove('offline');
                document.getElementById('statusText').textContent = '已连接';
            } catch (e) {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = '离线';
            }
        }

        // 页面加载时检查状态
        checkStatus();
        setInterval(checkStatus, 30000);

        // 自动聚焦输入框
        document.getElementById('userInput').focus();
    </script>
</body>
</html>
