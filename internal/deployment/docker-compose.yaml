version: '3.8'
services:
  # 1. 语义缓存 & 简单向量存储
  redis:
    image: redis/redis-stack:latest # 包含 RediSearch 和向量功能
    ports:
      - "6379:6379"
    environment:
      - REDIS_ARGS="--requirepass mypassword"

  # 2. 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI 面板
      - "14268:14268" # HTTP Collector
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

