version: '3.8'
services:
  # 1. 语义缓存 & 简单向量存储
  redis:
    image: redis/redis-stack:latest # 包含 RediSearch 和向量功能
    ports:
      - "6379:6379"
    environment:
      - REDIS_ARGS="--requirepass mypassword"

  # 2. 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI 面板
      - "14268:14268" # HTTP Collector
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true


  # 注意：为了演示方便，这里省略了庞大的 Milvus 集群配置
  # 实际开发初期，建议先用 Mock 或者简单的向量库（如 Qdrant 单机版）替代
  # 或者直接使用上面 Redis Stack 充当简易向量库